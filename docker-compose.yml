services:
    app:
        build:
            context: ./application/vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '1000'
                NODE_VERSION: '20'
        container_name: chainvote-app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '8080:${APP_PORT:-80}'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        env_file:
            - ./application/.env
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            APP_SERVICE: ${APP_SERVICE:-chainvote-app}
            XDEBUG_MODE: ${SAIL_XDEBUG_MODE:-off}
            XDEBUG_CONFIG: ${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}
        volumes:
            - './application:/var/www/html'
        networks:
            - chainvote
        depends_on:
            - lucid
            - chainvote.db
            - redis
            - minio

    worker:
        build:
            context: ./application/vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '1000'
                NODE_VERSION: '20'
        container_name: chainvote-worker
        command: 'php artisan horizon'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        env_file:
            - ./application/.env
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            APP_SERVICE: ${APP_SERVICE:-chainvote-worker}
            XDEBUG_MODE: ${SAIL_XDEBUG_MODE:-off}
            XDEBUG_CONFIG: ${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}
        volumes:
            - './application:/var/www/html'
        networks:
            - chainvote
        depends_on:
            - chainvote.db
            - redis

    lucid:
        build:
            context: lucid
            dockerfile: Dockerfile.dev
        container_name: chainvote-lucid
        command: npx nest start --watch
        expose:
            - "3000"
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        env_file:
            - ./application/.env
        volumes:
            - './lucid:/usr/src/app'
        networks:
            - chainvote
        environment:
            - APP_URL=http://chainvote-app

    serverless:
        build:
            context: serverless-lucid
            dockerfile: Dockerfile
        container_name: chainvote-serverless
        ports:
            - '3000:80'
        volumes:
            - './serverless-lucid/lib:/code/lib'
            - './serverless-lucid/routes:/code/routes'
        env_file:
            - ./serverless-lucid/.env
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        networks:
            - chainvote

    chainvote.db:
        image: postgres:17-alpine
        container_name: chainvote-db
        environment:
            POSTGRES_LOGGING: 'true'
            POSTGRES_DB: '${POSTGRES_DATABASE:-governor}'
            POSTGRES_USER: '${POSTGRES_USERNAME:-cardano}'
            POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-MdT6Sc7XfrpCMJw4D}'
            POSTGRES_POSTGRES_PASSWORD: '${POSTGRES_ROOT_PASSWORD:-bVd95i3mUPLKYqGVCRtN}'
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        healthcheck:
            test: pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
            interval: 10s
            timeout: 2s
            retries: 10
        volumes:
            - chainvote-db:/var/lib/postgresql/data
        logging:
            driver: "json-file"
            options:
                max-size: "200k"
                max-file: "10"
        networks:
            - chainvote

    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - chainvote-redis:/data
        networks:
            - chainvote
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    minio:
        image: minio/minio
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: chainvote-admin
            MINIO_ROOT_PASSWORD: chainvote-admin
            MINIO_DEFAULT_BUCKETS: chainvote-bucket
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - chainvote-minio:/data
        networks:
            - chainvote

networks:
    chainvote:
        driver: bridge

volumes:
    chainvote-db:
        driver: local
    chainvote-redis:
        driver: local
    chainvote-minio:
        driver: local
